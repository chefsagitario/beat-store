<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChefSagitario — Premium Beats</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <div class="nav-logo">CHEFSAGITARIO</div>
  <div class="nav-links">
    <a href="#catalog">Beats</a>
    <a href="#contact">Contact</a>
  </div>
  <a href="https://wa.me/905418630425" target="_blank">
    <button class="nav-inquire">Inquire</button>
  </a>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Chef<br>Sagitario</h1>
  <p>Premium Sound. No Compromise.</p>
  <div class="hero-buttons">
    <a href="#catalog">
      <button class="btn-primary">Browse Beats →</button>
    </a>
    <a href="#contact">
      <button class="btn-secondary">Contact</button>
    </a>
  </div>
</section>

<!-- CATALOG -->
<section class="catalog" id="catalog">
  <div class="catalog-header">
    <div class="catalog-label">CATALOG</div>
    <h2>All Beats</h2>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="filterBeats('all')">All</button>
    <button class="filter-btn" onclick="filterBeats('Hip-Hop')">Hip-Hop</button>
    <button class="filter-btn" onclick="filterBeats('Dancey')">Dancey</button>
    <button class="filter-btn" onclick="filterBeats('ChefSagitario Special')">ChefSagitario Special</button>
  </div>

  <div class="beat-grid" id="beat-grid">
    <div class="empty-state">No beats yet.</div>
  </div>
</section>

<!-- CONTACT -->
<section class="contact" id="contact">
  <div class="contact-label">CONTACT</div>
  <h2>Let's work.</h2>
  <p>DM for custom beats, exclusive licenses, or collabs.</p>
  <div class="contact-buttons">
    <a href="https://wa.me/905418630425" target="_blank">
      <button class="btn-primary">💬 WhatsApp</button>
    </a>
    <a href="http://linktr.ee/ChefSagitario" target="_blank">
      <button class="btn-secondary">🔗 Linktree</button>
    </a>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <div>
    <div style="font-weight:700;color:#fff;margin-bottom:4px;">CHEFSAGITARIO</div>
    <div>© 2026 ChefSagitario. All rights reserved.</div>
  </div>
  <div class="footer-links">
    <a href="https://wa.me/905418630425" target="_blank">WhatsApp</a>
    <a href="http://linktr.ee/ChefSagitario" target="_blank">Linktree</a>
    <a href="/admin.html">Admin</a>
  </div>
</footer>

<!-- AUDIO PLAYER BAR -->
<div class="player-bar" id="player-bar">
  <div class="player-info">
    <img class="player-cover" id="player-cover" src="" alt="">
    <div>
      <div class="player-title" id="player-title"></div>
      <div class="player-genre" id="player-genre"></div>
    </div>
  </div>
  <div class="player-controls">
    <div class="progress-bar" id="progress-bar" onclick="seekAudio(event)">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="player-time" id="player-time">0:00 / 0:30</div>
  </div>
  <a id="player-buy-link" href="#" target="_blank">
    <button class="player-buy">Buy →</button>
  </a>
</div>

<audio id="audio-player"></audio>

<script src="app.js"></script>
</body>
</html>
